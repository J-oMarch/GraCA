dataset:
  name: CiteSeer
  root: data/
  split: public
  normalize_features: true
  add_self_loops: false
  undirected: true

proxy_model:
  name: GCN
  hidden_dim: 64
  num_layers: 2
  dropout: 0.5
  activation: relu

downstream_model:
  names: [GCN, GAT, GraphSAGE]
  hidden_dim: 64
  num_layers: 2
  dropout: 0.5

training:
  epochs: 300
  lr: 0.01
  weight_decay: 0.0005
  patience: 100
  use_val_for_early_stopping: true
  device: cuda

teacher:
  use_ema: true
  ema_decay: 0.99
  update_after_epoch: 1
  warmup_epochs: 50

pseudo:
  tau: 0.6
  alpha: 1.0
  epsilon_rho: 0.05
  lambda_p: 1.0
  use_soft_label: true
  hard_pseudo: false

scoring:
  lambda_s: 1.0
  deterministic: true
  collect_layer: last
  eta: 1.0
  eps: 1.0e-12

pruning:
  beta: 0.2
  min_degree: 1
  lambda_theta: 0.0
  use_local_threshold: true
  use_top_budget: true
  protect_self_loops: true
  undirected_score_reduce: mean

baselines:
  dropedge_rate: 0.2

experiment:
  method: graca_lite
  oracle_only: false
  run_id: graca_lite_citeseer
  seeds: [0, 1, 2, 3, 4]

logging:
  save_checkpoints: true
  save_sanitized_graph: true
  save_edge_scores: true
  result_dir: results/main/
  graph_dir: sanitized_graphs/graca_lite/
