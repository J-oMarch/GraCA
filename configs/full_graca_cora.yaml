dataset:
  name: Cora
  root: data/
  split: public
  normalize_features: true
  add_self_loops: false
  undirected: true

proxy_model:
  name: GCN
  hidden_dim: 64
  num_layers: 2
  dropout: 0.5
  activation: relu

downstream_model:
  names: [GCN, GAT, GraphSAGE]
  hidden_dim: 64
  num_layers: 2
  dropout: 0.5

training:
  epochs: 300
  lr: 0.01
  weight_decay: 0.0005
  patience: 100
  use_val_for_early_stopping: true
  device: cuda

teacher:
  use_ema: true
  ema_decay: 0.99
  update_after_epoch: 1
  warmup_epochs: 50

pseudo:
  tau: 0.6
  alpha: 1.0
  epsilon_rho: 0.05
  lambda_p: 1.0
  use_soft_label: true
  hard_pseudo: false

consistency:
  use_consistency: true
  lambda_c: 0.1
  edge_dropout: 0.3
  feature_mask: 0.3

scoring:
  lambda_s: 1.0
  deterministic: true
  collect_layer: all
  use_multi_checkpoint: true
  checkpoints: [100, 150, 200, 250, 300]
  eta: 1.0
  eps: 1.0e-12

pruning:
  beta: 0.2
  min_degree: 1
  lambda_theta: 0.0
  use_local_threshold: true
  use_top_budget: true
  protect_self_loops: true
  protect_bridges: true
  undirected_score_reduce: mean

baselines:
  dropedge_rate: 0.2

experiment:
  method: full_graca
  oracle_only: false
  run_id: full_graca_cora
  seeds: [0, 1, 2, 3, 4]

logging:
  save_checkpoints: true
  save_sanitized_graph: true
  save_edge_scores: true
  result_dir: results/main/
  graph_dir: sanitized_graphs/full_graca/
